<% adapter = ENV.fetch "DB_ADAPTER", "sqlite3" %>
default: &default
  adapter: <%= adapter %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000
<% if adapter == "mysql2" %>
  host: 127.0.0.1
  username: root
  password: root
<% elsif adapter == "postgresql" %>
  host: localhost
  username: postgres
  password: postgres
<% end %>

development:
  <<: *default
<% if adapter == "sqlite3" %>
  database: storage/development.sqlite3
<% else %>
  database: ruby_llm_monitoring_development
<% end %>

test:
  <<: *default
<% if adapter == "sqlite3" %>
  database: storage/test.sqlite3
<% else %>
  database: ruby_llm_monitoring_test
<% end %>

production:
  <<: *default
  database: storage/production.sqlite3
